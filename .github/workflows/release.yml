name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version to release
        required: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive