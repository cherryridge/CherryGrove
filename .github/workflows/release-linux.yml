name: Release Pipeline (Linux)

on:
  push:
    branches:
      - stable
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        type: string
        default: stable
        description: The branch to build from

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Release (Linux ${{matrix.arch}})
    runs-on: ${{matrix.runner}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
            preset: linux-x64-release
          - arch: arm64
            runner: ubuntu-24.04-arm
            preset: linux-arm64-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup clang Toolchain
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install ca-certificates gpg wget
          sudo mkdir -p /etc/apt/keyrings
          wget -O- https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor | sudo tee /etc/apt/keyrings/llvm.gpg >/dev/null
          printf '%s\n' 'Types: deb' 'URIs: http://apt.llvm.org/noble/' 'Suites: llvm-toolchain-noble' 'Components: main' 'Signed-By: /etc/apt/keyrings/llvm.gpg' | sudo tee /etc/apt/sources.list.d/llvm.sources >/dev/null
          sudo apt update
          LLVM_MAJOR="$(apt-cache search --names-only '^clang-[0-9]+$' | awk '{print $1}' | sed -n 's/^clang-\([0-9]\+\)$/\1/p' | sort -n | tail -n1)"
          test -n "$LLVM_MAJOR"
          sudo apt install -y -t llvm-toolchain-noble "clang-${LLVM_MAJOR}" "clangd-${LLVM_MAJOR}" "lld-${LLVM_MAJOR}" "libc++-${LLVM_MAJOR}-dev" "libc++abi-${LLVM_MAJOR}-dev"
          export PATH="/usr/lib/llvm-${LLVM_MAJOR}/bin:$PATH"
          echo "/usr/lib/llvm-${LLVM_MAJOR}/bin" >> "$GITHUB_PATH"
          clang++ --version
          clang++ --version | grep -Eq 'clang version (2[2-9]|[3-9][0-9])\.'
          ld.lld --version

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest
    
      - name: Install 7z
        run: |
          set -euo pipefail
          sudo apt install -y 7zip
          7z

      - name: Install gperf
        run: |
          set -euo pipefail
          sudo apt install -y gperf
          gperf --version

      - name: Fetch prebuilt libraries
        run: |
          set -euo pipefail
          bash ./libs/fetch_prebuilt_libs.sh 7z "${{matrix.arch}}"

      - name: Install Wine64
        run: |
          set -euo pipefail
          if [[ "${{matrix.arch}}" == "arm64" ]]; then
            sudo apt install -y software-properties-common
            sudo add-apt-repository -y ppa:fex-emu/fex
            wget -O- https://ftp-master.debian.org/keys/archive-key-13.asc | gpg --dearmor | sudo tee /etc/apt/keyrings/debian-trixie.gpg >/dev/null
            printf '%s\n' 'Types: deb' 'URIs: http://deb.debian.org/debian' 'Suites: trixie' 'Components: main' 'Architectures: arm64' 'Signed-By: /etc/apt/keyrings/debian-trixie.gpg' | sudo tee /etc/apt/sources.list.d/debian-trixie.sources >/dev/null
            printf '%s\n' 'Package: *' 'Pin: release n=trixie' 'Pin-Priority: -1' '' 'Package: wine wine64 wine64-preloader wine64-tools wine-common libwine libwine-dev fonts-wine' 'Pin: release n=trixie' 'Pin-Priority: 1001' | sudo tee /etc/apt/preferences.d/debian-wine >/dev/null
            sudo apt update
            apt-cache policy wine wine64 libwine fex-emu-armv8.0 fex-emu-wine
            sudo apt install -y wine wine64 fex-emu-armv8.0 fex-emu-wine
            find /usr/lib -path '*/wine/aarch64-windows/*fex*.dll' -print
            fex_wow64_dll="$(find /usr/lib -path '*/wine/aarch64-windows/libwow64fex.dll' -print -quit)"
            if [[ -n "$fex_wow64_dll" ]]; then
              sudo cp -f "$fex_wow64_dll" "$(dirname "$fex_wow64_dll")/xtajit.dll"
            fi
            wine_cmd="$(command -v wine || command -v wine64)"
            test -n "$wine_cmd"
            echo "D3D4LINUX_WINE=$wine_cmd" >> "$GITHUB_ENV"
            echo "WINEPREFIX=$RUNNER_TEMP/wine-arm64" >> "$GITHUB_ENV"
            echo "WINEARCH=win64" >> "$GITHUB_ENV"
            echo "WINEDEBUG=-all" >> "$GITHUB_ENV"
            D3D4LINUX_WINE="$wine_cmd" WINEPREFIX="$RUNNER_TEMP/wine-arm64" WINEARCH=win64 WINEDEBUG=-all timeout 180s "$wine_cmd" wineboot --init
            fex_arm64ec_dll="$(find /usr/lib -path '*/wine/aarch64-windows/libarm64ecfex.dll' -print -quit)"
            if [[ -n "$fex_arm64ec_dll" ]]; then
              printf '%s\n' 'Windows Registry Editor Version 5.00' '' '[HKEY_LOCAL_MACHINE\Software\Microsoft\Wow64\amd64]' '@="libarm64ecfex.dll"' > "$RUNNER_TEMP/fex.reg"
              D3D4LINUX_WINE="$wine_cmd" WINEPREFIX="$RUNNER_TEMP/wine-arm64" WINEARCH=win64 WINEDEBUG=-all "$wine_cmd" regedit "$RUNNER_TEMP/fex.reg"
            fi
          else
            sudo apt install -y wine64
          fi
    
      - name: Install Linux-Only Dependencies
        run: |
          set -euo pipefail
          sudo apt install -y build-essential pkg-config libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

      - name: Configure
        run: cmake --preset ${{matrix.preset}} -DGPERF_EXECUTABLE=/usr/bin/gperf

      - name: Build
        run: cmake --build --preset ${{matrix.preset}} --verbose --parallel

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: CherryGrove-linux-${{matrix.arch}}-release-executable
          path: out/${{matrix.preset}}/CherryGrove
          if-no-files-found: error

  package-linux:
    name: Package Linux Release
    runs-on: ubuntu-24.04
    needs: build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install package dependencies
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y --no-install-recommends ca-certificates file tar wget

      - name: Download x64 executable
        uses: actions/download-artifact@v4
        with:
          name: CherryGrove-linux-x64-release-executable
          path: out/linux-x64-release

      - name: Download arm64 executable
        uses: actions/download-artifact@v4
        with:
          name: CherryGrove-linux-arm64-release-executable
          path: out/linux-arm64-release

      - name: Package
        working-directory: packing/linux
        run: |
          set -euo pipefail
          chmod +x ./pack.sh
          APPIMAGE_EXTRACT_AND_RUN=1 ./pack.sh

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: CherryGrove-linux-release
          path: |
            packing/linux/CherryGrove_linux_x64.tar.gz
            packing/linux/CherryGrove_linux_arm64.tar.gz
          if-no-files-found: error