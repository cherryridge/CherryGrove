name: Release Pipeline (macOS)

on:
  workflow_call:
    inputs:
      branch:
        type: string
        default: stable
        description: The branch to build from

permissions:
  contents: read

jobs:
  build-macos:
    name: Build Release (macOS ${{matrix.arch}})
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            preset: macos-x64-release
          - arch: arm64
            preset: macos-arm64-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install 7z
        run: |
          set -euo pipefail
          brew install 7zip
          7z

      - name: Install gperf
        run: |
          set -euo pipefail
          brew install gperf
          gperf --version

      - name: Install LLVM (clang)
        run: |
          set -euo pipefail
          brew install llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LLVM_PREFIX=$LLVM_PREFIX" >> "$GITHUB_ENV"
          echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
          "$LLVM_PREFIX/bin/clang" --version

      - name: Fetch prebuilt libraries
        run: |
          set -euo pipefail
          chmod +x ./libs/fetch_prebuilt_libs.sh
          ./libs/fetch_prebuilt_libs.sh 7z "${{matrix.arch}}"

      - name: Configure
        run: |
          set -euo pipefail
          : "${LLVM_PREFIX:?LLVM_PREFIX not set}"
          export CC="$LLVM_PREFIX/bin/clang"
          export CXX="$LLVM_PREFIX/bin/clang++"
          export OBJC="$LLVM_PREFIX/bin/clang"
          cmake --preset ${{matrix.preset}} -DGPERF_EXECUTABLE=/usr/bin/gperf -DCG_COMPILE_SHADERS=OFF -DCMAKE_C_COMPILER="$CC" -DCMAKE_CXX_COMPILER="$CXX" -DCMAKE_OBJC_COMPILER="$OBJC"

      - name: Download shaders
        uses: actions/download-artifact@v4
        with:
          name: CherryGrove-shaders
          path: out/${{matrix.preset}}/shaders

      - name: Build
        run: cmake --build --preset ${{matrix.preset}} --verbose --parallel

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: CherryGrove-macos-${{matrix.arch}}-release-executable
          path: out/${{matrix.preset}}/CherryGrove
          if-no-files-found: error

  package-macos:
    name: Package macOS Release
    runs-on: macos-latest
    needs: build-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Install package dependencies
        run: |
          set -euo pipefail
          brew install --no-quarantine create-dmg file gnu-tar wget

      - name: Download x64 executable
        uses: actions/download-artifact@v4
        with:
          name: CherryGrove-macos-x64-release-executable
          path: out/macos-x64-release

      - name: Download arm64 executable
        uses: actions/download-artifact@v4
        with:
          name: CherryGrove-macos-arm64-release-executable
          path: out/macos-arm64-release

      - name: Package
        working-directory: packing/macos
        run: |
          set -euo pipefail
          chmod +x ./pack.sh
          ./pack.sh

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: CherryGrove-macos-release
          path: |
            out/macos-x64-release/CherryGrove-macos-x64.dmg
            out/macos-arm64-release/CherryGrove-macos-arm64.dmg
          if-no-files-found: error